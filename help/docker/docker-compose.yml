services:
  # mysql 容器
  mysql:
    container_name: crmeb_mysql
    image: ccr.ccs.tencentyun.com/crmebky_php/mysql:v8.0.45
    ports:
      - "33061:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_USER: crmeb
      MYSQL_PASSWORD: 123456
      MYSQL_DATABASE: crmeb
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/log:/var/log/mysql
    networks:
      app_net:
        ipv4_address: 192.168.10.11
  # redis 容器
  redis:
    container_name: crmeb_redis
    image: ccr.ccs.tencentyun.com/crmebky_php/redis:v8.6.1
    ports:
      - "63791:6379"
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: 123456
    networks:
      app_net:
        ipv4_address: 192.168.10.10
  # php 容器
  phpfpm:
    container_name: crmeb_php
    image: ccr.ccs.tencentyun.com/crmebky_php/php:v7.4
    restart: always
    environment:
      TZ: Asia/Shanghai
      MYSQL_HOST_IP: crmeb_mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: crmeb
      MYSQL_PASSWORD: 123456
      MYSQL_DATABASE: crmeb
      REDIS_HOST_IP: crmeb_redis
      REDIS_PORT: "6379"
      REDIS_DATABASE: "0"
      REDIS_PASSWORD: 123456
      APP_DEBUG: true
      DEFAULT_TIMEZONE: Asia/Shanghai
    ports:
      - "9000:9000"
      - "40001:40001"
      - "40002:40002"
    working_dir: /var/www
    volumes:
      - ../../crmeb:/var/www
      - ../../crmeb/runtime:/var/www/runtime
    networks:
      app_net:
        ipv4_address: 192.168.10.90
  # nginx 容器
  nginx:
    container_name: crmeb_nginx
    image: ccr.ccs.tencentyun.com/crmebky_php/nginx:v1.29.6
    restart: always
    ports:
      - "8011:80"
    depends_on:
      - phpfpm
    environment:
      TZ: Asia/Shanghai
    working_dir: /var/www
    volumes_from:
      - phpfpm
    volumes:
      - ./nginx/vhost.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/log:/etc/nginx/log
    networks:
      app_net:
        ipv4_address: 192.168.10.80
networks:
  app_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.10.0/24