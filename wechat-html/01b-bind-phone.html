<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绑定手机号 - 阿利老西</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;padding:40px 0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F0EFED;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;}
.phone-frame{width:375px;height:812px;border-radius:44px;overflow:hidden;background:#fff;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;display:flex;flex-direction:column;}
.phone-screen::-webkit-scrollbar{display:none;}
.nav-bar{display:flex;align-items:center;padding:54px 20px 12px;}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.nav-back svg{width:20px;height:20px;color:#1A1A1A;}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:400;color:#1A1A1A;margin-right:32px;letter-spacing:1px;}
.container{padding:40px 32px;display:flex;flex-direction:column;}
.page-title{font-size:24px;font-weight:300;color:#1A1A1A;letter-spacing:2px;margin-bottom:6px;}
.page-desc{font-size:13px;color:rgba(0,0,0,0.35);margin-bottom:36px;font-weight:300;}
.form-group{margin-bottom:20px;}
.form-label{font-size:12px;color:rgba(0,0,0,0.4);margin-bottom:8px;letter-spacing:1px;font-weight:400;}
.form-row{display:flex;align-items:center;gap:12px;}
.phone-prefix{font-size:15px;color:#1A1A1A;font-weight:400;}
.form-input{flex:1;height:48px;background:transparent;border:none;border-bottom:1px solid rgba(0,0,0,0.08);padding:0 0 0 0;font-size:15px;color:#1A1A1A;font-family:inherit;outline:none;letter-spacing:0.5px;}
.form-input::placeholder{color:rgba(0,0,0,0.2);}
.form-input:focus{border-bottom-color:#1A1A1A;}
.code-row{display:flex;align-items:center;gap:12px;}
.code-input{flex:1;height:48px;background:transparent;border:none;border-bottom:1px solid rgba(0,0,0,0.08);padding:0;font-size:15px;color:#1A1A1A;font-family:inherit;outline:none;letter-spacing:2px;}
.code-input::placeholder{color:rgba(0,0,0,0.2);}
.code-btn{padding:0;height:48px;border:none;background:transparent;color:#1A1A1A;font-size:13px;font-weight:400;font-family:inherit;cursor:pointer;white-space:nowrap;letter-spacing:0.5px;border-bottom:1px solid rgba(0,0,0,0.15);}
.submit-btn{width:100%;height:50px;border-radius:25px;border:none;background:#1A1A1A;color:#fff;font-size:15px;font-weight:400;font-family:inherit;cursor:pointer;margin-top:40px;letter-spacing:2px;}
.skip-link{text-align:center;margin-top:16px;font-size:12px;color:rgba(0,0,0,0.25);cursor:pointer;letter-spacing:1px;font-weight:300;}
.note{font-size:10px;color:rgba(0,0,0,0.15);text-align:center;margin-top:28px;line-height:1.7;letter-spacing:0.5px;}
</style>
</head>
<body>
<div class="phone-frame">
<div class="phone-screen">
<div class="nav-bar">
<div class="nav-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></div>
<div class="nav-title">绑定手机号</div>
</div>
<div class="container">
<div class="page-title">绑定手机号</div>
<div class="page-desc">绑定手机号以完成注册，保障您的账户安全</div>
<div class="form-group">
<div class="form-label">手机号</div>
<div class="form-row">
<span class="phone-prefix">+86</span>
<input class="form-input" type="tel" placeholder="请输入手机号" maxlength="11" aria-label="手机号">
</div>
</div>
<div class="form-group">
<div class="form-label">验证码</div>
<div class="code-row">
<input class="code-input" type="text" placeholder="请输入验证码" maxlength="6" aria-label="验证码">
<button class="code-btn">获取验证码</button>
</div>
</div>
<button class="submit-btn">确认绑定</button>
<div class="skip-link">暂时跳过</div>
<div class="note">绑定手机号后，您可使用手机号登录并接收重要通知<br>我们严格遵守隐私保护政策</div>
</div>
</div>
</div>
</body>
</html>
