<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布动态 - 阿利老西</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;padding:40px 0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F0EFED;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;}
.phone-frame{width:375px;height:812px;border-radius:44px;overflow:hidden;background:#fff;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;}
.phone-screen::-webkit-scrollbar{display:none;}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:50px 20px 14px;}
.nav-cancel{font-size:14px;color:rgba(0,0,0,0.4);cursor:pointer;font-weight:300;letter-spacing:0.5px;}
.nav-title{font-size:15px;font-weight:400;color:#1A1A1A;letter-spacing:2px;}
.nav-publish{padding:7px 20px;background:#1A1A1A;color:#fff;border:none;border-radius:20px;font-size:12px;font-weight:400;cursor:pointer;font-family:inherit;letter-spacing:1px;}
.editor-section{padding:24px 20px;}
.text-area{width:100%;min-height:160px;border:none;outline:none;font-size:15px;color:#1A1A1A;line-height:1.8;font-family:inherit;font-weight:300;resize:none;}
.text-area::placeholder{color:rgba(0,0,0,0.2);}
.char-count{text-align:right;font-size:11px;color:rgba(0,0,0,0.2);margin-top:8px;font-weight:300;}
.divider{height:1px;background:rgba(0,0,0,0.04);margin:0 20px;}
.media-section{padding:20px;}
.media-title{font-size:11px;letter-spacing:3px;color:rgba(0,0,0,0.3);text-transform:uppercase;margin-bottom:14px;font-weight:400;}
.media-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px;}
.media-item{height:100px;border-radius:8px;background:#F0EFED;position:relative;}
.media-item:nth-child(2){background:#EBE9E6;}
.media-item:nth-child(3){background:#E8E6E3;}
.media-remove{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}
.media-add{height:100px;border-radius:8px;border:1px dashed rgba(0,0,0,0.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
.media-add svg{width:24px;height:24px;color:rgba(0,0,0,0.2);stroke-width:1.2;}
.media-add span{font-size:10px;color:rgba(0,0,0,0.25);font-weight:300;}
.options-section{padding:0 20px 20px;}
.option-item{display:flex;align-items:center;padding:16px 0;border-bottom:1px solid rgba(0,0,0,0.04);cursor:pointer;}
.option-item:last-child{border-bottom:none;}
.option-icon{width:20px;height:20px;margin-right:14px;display:flex;align-items:center;justify-content:center;}
.option-icon svg{width:18px;height:18px;color:rgba(0,0,0,0.35);stroke-width:1.2;}
.option-text{flex:1;font-size:13px;color:#1A1A1A;letter-spacing:0.5px;}
.option-value{font-size:12px;color:rgba(0,0,0,0.3);font-weight:300;margin-right:6px;}
.option-arrow{font-size:14px;color:rgba(0,0,0,0.15);}
.member-notice{margin:0 20px 20px;padding:16px;background:#FAFAF8;border:1px solid rgba(0,0,0,0.04);border-radius:8px;display:flex;align-items:center;gap:12px;}
.notice-icon svg{width:20px;height:20px;color:rgba(0,0,0,0.25);stroke-width:1.2;}
.notice-text{flex:1;font-size:12px;color:rgba(0,0,0,0.4);line-height:1.5;font-weight:300;}
.notice-text strong{color:#1A1A1A;font-weight:400;}
.toolbar{position:absolute;bottom:0;left:0;right:0;height:56px;padding:0 16px;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,0.04);}
.tool-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;}
.tool-btn svg{width:20px;height:20px;color:rgba(0,0,0,0.35);stroke-width:1.2;}
.tool-btn:hover{background:rgba(0,0,0,0.03);}
.tool-divider{width:1px;height:20px;background:rgba(0,0,0,0.06);margin:0 4px;}
</style>
</head>
