*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;padding:40px 0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F0EFED;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;}
.phone-frame{width:375px;height:812px;border-radius:44px;overflow:hidden;background:#fff;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.08);}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;}
.phone-screen::-webkit-scrollbar{display:none;}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:44px;}
.status-time{font-size:15px;font-weight:500;color:#1A1A1A;}
.page-header{padding:8px 24px 16px;background:linear-gradient(180deg, #E8DDD3 0%, #EDE4DA 40%, #F3ECE5 70%, #fff 100%);}
.page-title{font-size:26px;font-weight:300;color:#1A1A1A;letter-spacing:3px;animation:titleFadeIn 0.8s ease-out 0.6s both;}
.wm-wrap{position:relative;height:50px;overflow:hidden;margin-bottom:4px;}
.wm{position:absolute;opacity:0;will-change:transform,opacity;}
.wm-class{font-size:28px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:3px;top:2px;left:-6px;text-shadow:0 0 10px rgba(255,255,255,0.08);--init-r:-5deg;transform:rotate(-5deg);animation:wmFadeIn 0.7s ease-out 0.1s forwards, wmOrbit 16s linear 0.8s infinite;}
.wm-ali{font-size:20px;font-weight:300;color:rgba(255,255,255,0.3);letter-spacing:2px;top:14px;left:80px;text-shadow:0 0 8px rgba(255,255,255,0.06);--init-r:6deg;transform:rotate(6deg);animation:wmFadeIn 0.7s ease-out 0.3s forwards, wmOrbit 16s linear 1s infinite;}
.wm-study{font-size:24px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:2px;top:6px;left:180px;text-shadow:0 0 10px rgba(255,255,255,0.08);--init-r:-3deg;transform:rotate(-3deg);animation:wmFadeIn 0.7s ease-out 0.5s forwards, wmOrbit 16s linear 1.2s infinite;}
@keyframes wmFadeIn{
  from{opacity:0;transform:translateY(12px) rotate(0deg);}
  to{opacity:1;transform:translateY(0) rotate(var(--init-r, 0deg));}
}
@keyframes titleFadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes wmOrbit{
  0%{transform:rotate(-5deg) translate(0,0);}
  12.5%{transform:rotate(-2deg) translate(5px,-6px);}
  25%{transform:rotate(0deg) translate(9px,-3px);}
  37.5%{transform:rotate(2deg) translate(7px,3px);}
  50%{transform:rotate(5deg) translate(0,7px);}
  62.5%{transform:rotate(3deg) translate(-7px,4px);}
  75%{transform:rotate(0deg) translate(-9px,0);}
  87.5%{transform:rotate(-2deg) translate(-5px,-5px);}
  100%{transform:rotate(-5deg) translate(0,0);}
}

.member-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:900;color:rgba(107,118,79,0.1);letter-spacing:6px;white-space:nowrap;pointer-events:none;z-index:1;}

/* QR Modal */
.modal-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;animation:modalFadeIn 0.3s ease;}
.modal-overlay.show{display:flex;}
@keyframes modalFadeIn{from{opacity:0;}to{opacity:1;}}
.modal-card{background:#fff;border-radius:16px;padding:28px 24px 24px;width:280px;text-align:center;position:relative;animation:modalSlideUp 0.35s ease;}

.modal-close:hover{background:rgba(0,0,0,0.08);}

.modal-title{font-size:15px;font-weight:600;color:#1A1A1A;margin-bottom:14px;letter-spacing:1px;}
.modal-qr{width:160px;height:160px;margin:0 auto 14px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);overflow:hidden;background:#FAFAF8;display:flex;align-items:center;justify-content:center;}

var curCat='全部';

function render(){
  var list=curCat==='全部'?courses:courses.filter(function(c){return c.c===curCat;});
  var el=document.getElementById('courseList');
  if(!list.length){
    el.innerHTML='<div style="text-align:center;padding:40px 0;color:rgba(0,0,0,0.2);font-size:13px;">暂无课程</div>';
    return;
  }
  var html='';
  list.forEach(function(c,i){
    html+='<div class="course-card" style="animation:fadeUp 0.35s ease '+(i*50)+'ms both">';
    html+='<div class="course-thumb"><div class="ph" style="background:'+c.bg+'"></div><div class="course-tag">'+c.t+'</div></div>';
    html+='<div class="course-info"><div class="course-name">'+c.n+'</div><div class="course-desc">'+c.d+'</div>';
    html+='<div class="course-bottom"><div class="course-price">'+c.p+' <span class="orig">'+c.o+'</span></div><div class="course-bottom-right"><div class="course-meta">'+c.s+'人已学</div><button class="course-buy" onclick="buyCourse(\''+c.n+'\')">购买</button></div></div>';
    html+='</div></div>';
  });
  el.innerHTML=html;
}

function switchCat(el){
  document.querySelectorAll('#catBar .cat-tag').forEach(function(e){e.classList.remove('active')});
  el.classList.add('active');
  curCat=el.textContent.trim();
  el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  render();
}

render();

function openModal(){
  document.getElementById('qrModal').classList.add('show');
}
function closeModal(e){
  if(e.target.classList.contains('modal-overlay')||e.target.classList.contains('modal-close')){
    document.getElementById('qrModal').classList.remove('show');
  }
}
function buyCourse(name){
  var el=document.getElementById('orderToast');
  el.querySelector('.toast-name').textContent=name;
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}
// Scroll parallax for watermark letters
(function(){
  var screen=document.querySelector('.phone-screen');
  if(!screen)return;
  var cls=document.querySelector('.wm-class');
  var ali=document.querySelector('.wm-ali');
  var study=document.querySelector('.wm-study');
  if(!cls||!ali||!study)return;
  screen.addEventListener('scroll',function(){
    var y=screen.scrollTop;
    var factor=y*0.15;
    cls.style.marginTop=(factor*0.8)+'px';
    ali.style.marginTop=(factor*1.2)+'px';
    study.style.marginTop=(factor*0.5)+'px';
  },{passive:true});
})();
</script>
