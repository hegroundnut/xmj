<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏 - 阿利老西</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;padding:40px 0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F0EFED;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;}
.phone-frame{width:375px;height:812px;border-radius:44px;overflow:hidden;background:#fff;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;}
.phone-screen::-webkit-scrollbar{display:none;}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:50px 20px 14px;}
.nav-back{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#FAFAF8;}
.nav-back svg{width:18px;height:18px;color:#1A1A1A;stroke-width:1.5;}
.nav-title{font-size:15px;font-weight:400;color:#1A1A1A;letter-spacing:2px;}
.nav-right{width:32px;}
.filter-tabs{display:flex;gap:8px;padding:12px 20px 16px;align-items:center;}
.filter-tab{padding:6px 16px;border-radius:20px;font-size:12px;color:rgba(0,0,0,0.35);font-weight:300;cursor:pointer;border:1px solid rgba(0,0,0,0.06);background:transparent;letter-spacing:0.5px;white-space:nowrap;}
.filter-tab.active{background:#1A1A1A;color:#fff;border-color:#1A1A1A;font-weight:400;}
.content-area{padding:0 20px 40px;}
.section-count{font-size:11px;color:rgba(0,0,0,0.25);font-weight:300;letter-spacing:0.5px;margin-bottom:12px;}
.fav-card{display:flex;gap:12px;padding:14px;background:#FAFAF8;border:1px solid rgba(0,0,0,0.04);border-radius:8px;margin-bottom:10px;cursor:pointer;}
.fav-thumb{width:80px;height:60px;border-radius:6px;background:#F0EFED;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.fav-thumb svg{width:24px;height:24px;color:rgba(0,0,0,0.1);stroke-width:1;}
.fav-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.fav-title{font-size:13px;color:#1A1A1A;font-weight:400;letter-spacing:0.3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.fav-meta{display:flex;align-items:center;gap:8px;margin-top:4px;}
.fav-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:400;letter-spacing:0.5px;border:1px solid rgba(0,0,0,0.08);color:rgba(0,0,0,0.4);background:#fff;line-height:1.5;}
.fav-date{font-size:10px;color:rgba(0,0,0,0.2);font-weight:300;letter-spacing:0.3px;}
.fav-actions{display:flex;align-items:center;margin-left:auto;}
.fav-unsave{font-size:11px;color:rgba(0,0,0,0.25);font-weight:300;cursor:pointer;white-space:nowrap;letter-spacing:0.3px;}
.empty-hint{text-align:center;padding:60px 20px;color:rgba(0,0,0,0.2);font-size:13px;font-weight:300;}
</style>
</head>
<body>
<div class="phone-frame"><div class="phone-screen">

<div class="nav-bar">
  <div class="nav-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg></div>
  <span class="nav-title">我的收藏</span>
  <div class="nav-right"></div>
</div>

<div class="filter-tabs">

  <span class="filter-tab">帖子</span>
  <span class="filter-tab">案例</span>
  <span class="filter-tab">课程</span>

<div class="content-area">

  <!-- Item 3: 课程 -->

    </div>
    <div class="fav-body">
      <div class="fav-title">零基础洗眉进阶：皮秒与激光的选择策略</div>
      <div class="fav-meta">
        <span class="fav-tag">课程</span>
        <span class="fav-date">2025-06-05</span>
        <div class="fav-actions"><span class="fav-unsave">取消收藏</span></div>
      </div>
    </div>
  </div>

  <!-- Item 4: 帖子 -->
  <div class="fav-card">
    <div class="fav-thumb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="fav-body">
      <div class="fav-title">开店三年，分享一些留客心得和定价思路</div>
      <div class="fav-meta">
        <span class="fav-tag">帖子</span>
        <span class="fav-date">2025-05-28</span>
        <div class="fav-actions"><span class="fav-unsave">取消收藏</span></div>
      </div>
    </div>
  </div>

  <!-- Item 5: 案例 -->
  <div class="fav-card">
    <div class="fav-thumb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <div class="fav-body">
      <div class="fav-title">蓝眉矫正配色方案 · 冷色调转自然棕</div>
      <div class="fav-meta">
        <span class="fav-tag">案例</span>
        <span class="fav-date">2025-05-20</span>
        <div class="fav-actions"><span class="fav-unsave">取消收藏</span></div>
      </div>
    </div>
  </div>

</div>

</div></div>
</body>
</html>
