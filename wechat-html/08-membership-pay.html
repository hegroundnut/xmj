<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开通会员 - 阿利老西</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;padding:40px 0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F0EFED;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;}
.phone-frame{width:375px;height:812px;border-radius:44px;overflow:hidden;background:#fff;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;}
.phone-screen::-webkit-scrollbar{display:none;}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:50px 20px 14px;}
.nav-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.nav-close svg{width:20px;height:20px;color:#1A1A1A;stroke-width:1.5;}
.nav-title{font-size:15px;font-weight:400;color:#1A1A1A;letter-spacing:2px;}
.nav-placeholder{width:32px;}
.hero-section{padding:20px 20px 28px;text-align:center;}
.hero-brand{font-size:10px;letter-spacing:5px;color:rgba(0,0,0,0.25);text-transform:uppercase;margin-bottom:12px;font-weight:300;}
.hero-title{font-size:24px;font-weight:300;color:#1A1A1A;letter-spacing:3px;margin-bottom:6px;}
.hero-sub{font-size:12px;color:rgba(0,0,0,0.35);font-weight:300;letter-spacing:1px;}
.plans-section{padding:0 20px;margin-bottom:24px;}
.plans-grid{display:flex;gap:10px;}
.plan-card{flex:1;padding:20px 14px;border:1px solid rgba(0,0,0,0.06);border-radius:10px;text-align:center;cursor:pointer;position:relative;background:#fff;transition:all 0.2s;}
.plan-card.active{border-color:#1A1A1A;background:#FAFAF8;}
.plan-badge{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;font-size:9px;padding:3px 12px;border-radius:0 0 6px 6px;letter-spacing:1px;}
.plan-name{font-size:12px;color:rgba(0,0,0,0.4);font-weight:300;margin-bottom:10px;letter-spacing:1px;margin-top:8px;}
.plan-price{font-size:24px;font-weight:300;color:#1A1A1A;letter-spacing:1px;margin-bottom:2px;}
.plan-price .currency{font-size:13px;font-weight:400;}
.plan-unit{font-size:10px;color:rgba(0,0,0,0.3);font-weight:300;margin-bottom:10px;}
.plan-orig{font-size:11px;color:rgba(0,0,0,0.2);text-decoration:line-through;font-weight:300;margin-bottom:6px;}
.plan-save{font-size:10px;color:#1A1A1A;background:#F0EFED;padding:3px 10px;border-radius:10px;display:inline-block;letter-spacing:0.5px;}
.benefits-section{padding:0 20px;margin-bottom:24px;}
.benefits-title{font-size:11px;letter-spacing:3px;color:rgba(0,0,0,0.3);text-transform:uppercase;margin-bottom:14px;font-weight:400;}
.benefit-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.04);}
.benefit-item:last-child{border-bottom:none;}
.benefit-check{width:20px;height:20px;border-radius:50%;background:#FAFAF8;border:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.benefit-check svg{width:12px;height:12px;color:#1A1A1A;stroke-width:2;}
.benefit-text{flex:1;font-size:13px;color:#1A1A1A;font-weight:400;letter-spacing:0.5px;}
.benefit-desc{font-size:11px;color:rgba(0,0,0,0.3);font-weight:300;}
.payment-section{padding:0 20px;margin-bottom:20px;}
.payment-title{font-size:11px;letter-spacing:3px;color:rgba(0,0,0,0.3);text-transform:uppercase;margin-bottom:14px;font-weight:400;}
.payment-options{display:flex;flex-direction:column;gap:8px;}
.payment-option{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid rgba(0,0,0,0.06);border-radius:8px;cursor:pointer;}
.payment-option.active{border-color:#1A1A1A;background:#FAFAF8;}
.payment-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.payment-icon.wechat{background:#07C160;}
.payment-icon.wechat svg{width:18px;height:18px;color:#fff;}
.payment-icon.alipay{background:#1677FF;}
.payment-icon.alipay svg{width:18px;height:18px;color:#fff;}
.payment-name{flex:1;font-size:13px;color:#1A1A1A;font-weight:400;letter-spacing:0.5px;}
.payment-radio{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;}
.payment-radio.active{border-color:#1A1A1A;}
.payment-radio.active::after{content:'';width:10px;height:10px;border-radius:50%;background:#1A1A1A;}
.agreement{padding:0 20px;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px;}
.checkbox{width:16px;height:16px;border:1.5px solid rgba(0,0,0,0.15);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;}
.checkbox.checked{background:#1A1A1A;border-color:#1A1A1A;}
.checkbox.checked svg{width:10px;height:10px;color:#fff;stroke-width:2.5;}
.agreement-text{font-size:11px;color:rgba(0,0,0,0.35);line-height:1.5;font-weight:300;}
.agreement-text a{color:#1A1A1A;text-decoration:none;font-weight:400;}
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:90px;padding:0 20px 28px;display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,0.04);}
.pay-btn{width:100%;padding:14px;background:#1A1A1A;color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:400;cursor:pointer;font-family:inherit;letter-spacing:2px;}
.pay-note{font-size:10px;color:rgba(0,0,0,0.25);font-weight:300;}
.content-area{padding-bottom:110px;}
</style>
</head>
<body>
<div class="phone-frame"><div class="phone-screen">
<div class="nav-bar">
<div class="nav-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
<span class="nav-title">开通会员</span>
<div class="nav-placeholder"></div>
</div>
<div class="content-area">
<div class="hero-section">
<div class="hero-brand">ALI LAOXI MEMBER</div>
<div class="hero-title">阿利老西会员</div>
<div class="hero-sub">解锁全部权益 · 持续学习成长</div>
</div>
<div class="plans-section">
<div class="plans-grid">
<div class="plan-card"><div class="plan-name">月卡</div><div class="plan-price"><span class="currency">¥</span>39</div><div class="plan-unit">/月</div><div class="plan-orig">¥69</div></div>
<div class="plan-card active"><div class="plan-badge">推荐</div><div class="plan-name">季卡</div><div class="plan-price"><span class="currency">¥</span>99</div><div class="plan-unit">/季</div><div class="plan-orig">¥207</div><div class="plan-save">省 ¥108</div></div>
<div class="plan-card"><div class="plan-name">年卡</div><div class="plan-price"><span class="currency">¥</span>299</div><div class="plan-unit">/年</div><div class="plan-orig">¥828</div><div class="plan-save">省 ¥529</div></div>
</div>
</div>
<div class="benefits-section">
<div class="benefits-title">会员权益</div>
<div class="benefit-item"><div class="benefit-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="benefit-text">全部课程免费学</div><div class="benefit-desc">128+精品课程，持续更新</div></div></div>
<div class="benefit-item"><div class="benefit-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="benefit-text">线下课程专属折扣</div><div class="benefit-desc">会员享8折优惠</div></div></div>
<div class="benefit-item"><div class="benefit-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="benefit-text">朋友圈发布权限</div><div class="benefit-desc">与同行交流分享经验</div></div></div>
<div class="benefit-item"><div class="benefit-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="benefit-text">专属社群与答疑</div><div class="benefit-desc">导师在线答疑，同行交流</div></div></div>
<div class="benefit-item"><div class="benefit-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="benefit-text">产品购买优惠</div><div class="benefit-desc">设备耗材会员专属价</div></div></div>
</div>
<div class="payment-section">
<div class="payment-title">支付方式</div>
<div class="payment-options">
<div class="payment-option active"><div class="payment-icon wechat"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18z"/></svg></div><span class="payment-name">微信支付</span><div class="payment-radio active"></div></div>
<div class="payment-option"><div class="payment-icon alipay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2.2 12.1c-.9-.4-2.3-1-3.6-1.5.7-1.3 1.2-2.8 1.4-4.4h-2.4v-1.4h3V6.8h1.4v1h3v1.4h-3v.6c-.2 1.4-.6 2.6-1.2 3.7 1.1.4 2.3.9 3.1 1.3l-.7 1.3z"/></svg></div><span class="payment-name">支付宝</span><div class="payment-radio"></div></div>
</div>
</div>
<div class="agreement">
<div class="checkbox checked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
<div class="agreement-text">开通即表示同意 <a>《会员服务协议》</a> 和 <a>《自动续费条款》</a></div>
</div>
</div>
<div class="bottom-bar">
<button class="pay-btn">立即开通 · ¥99/季</button>
<div class="pay-note">到期自动续费，可随时取消</div>
</div>
</div></div>
</body>
</html>
