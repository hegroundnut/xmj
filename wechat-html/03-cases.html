<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案例展示 - 阿利老西</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;padding:40px 0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F0EFED;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;}
.phone-frame{width:375px;height:812px;border-radius:44px;overflow:hidden;background:#fff;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;}
.phone-screen::-webkit-scrollbar{display:none;}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:44px;}
.status-time{font-size:15px;font-weight:500;color:#1A1A1A;}
.status-icons{display:flex;gap:5px;}
.status-icons svg{width:16px;height:16px;color:#1A1A1A;}
.page-header{padding:8px 24px 16px;background:linear-gradient(180deg, #E8DDD3 0%, #EDE4DA 40%, #F3ECE5 70%, #fff 100%);}
.page-title{font-size:26px;font-weight:300;color:#1A1A1A;letter-spacing:3px;animation:titleFadeIn 0.8s ease-out 0.6s both;}

/* Watermark letters */
.wm-wrap{position:relative;height:50px;overflow:hidden;margin-bottom:4px;}
.wm{position:absolute;opacity:0;will-change:transform,opacity;}
.wm-ali{font-size:28px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:3px;top:2px;left:-5px;text-shadow:0 0 10px rgba(255,255,255,0.08);--init-r:-8deg;transform:rotate(-8deg);animation:wmFadeIn 0.7s ease-out 0.1s forwards, wmOrbit 16s linear 0.8s infinite;}
.wm-studio{font-size:20px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:2px;top:18px;left:90px;text-shadow:0 0 8px rgba(255,255,255,0.06);--init-r:5deg;transform:rotate(5deg);animation:wmFadeIn 0.7s ease-out 0.3s forwards, wmOrbit 16s linear 1s infinite;}
.wm-brow{font-size:32px;font-weight:300;color:rgba(255,255,255,0.3);letter-spacing:4px;top:8px;left:180px;text-shadow:0 0 10px rgba(255,255,255,0.08);--init-r:-3deg;transform:rotate(-3deg);animation:wmFadeIn 0.7s ease-out 0.5s forwards, wmOrbit 16s linear 1.2s infinite;}

@keyframes wmFadeIn{
  from{opacity:0;transform:translateY(12px) rotate(0deg);}
  to{opacity:1;transform:translateY(0) rotate(var(--init-r, 0deg));}
}
@keyframes titleFadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes wmOrbit{
  0%{transform:rotate(-5deg) translate(0,0);}
  12.5%{transform:rotate(-2deg) translate(5px,-6px);}
  25%{transform:rotate(0deg) translate(9px,-3px);}
  37.5%{transform:rotate(2deg) translate(7px,3px);}
  50%{transform:rotate(5deg) translate(0,7px);}
  62.5%{transform:rotate(3deg) translate(-7px,4px);}
  75%{transform:rotate(0deg) translate(-9px,0);}
  87.5%{transform:rotate(-2deg) translate(-5px,-5px);}
  100%{transform:rotate(-5deg) translate(0,0);}
}
.tabs{display:flex;padding:0 24px 14px;gap:16px;}
.tab-pill{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:10px 24px;border-radius:14px;cursor:pointer;transition:all 0.25s ease;background:transparent;border:none;font-family:inherit;}
.tab-pill .en{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:lowercase;color:rgba(0,0,0,0.22);transition:color 0.25s;}
.tab-pill .cn{font-size:14px;font-weight:400;color:rgba(0,0,0,0.35);transition:color 0.25s;}
.tab-pill.active{background:#1A1A1A;}
.tab-pill.active .en{color:rgba(255,255,255,0.5);font-weight:500;}
.tab-pill.active .cn{color:#fff;font-weight:500;}
.cat-bar{overflow-x:auto;white-space:nowrap;scrollbar-width:none;padding:0 24px 12px;-webkit-overflow-scrolling:touch;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-inner{display:inline-flex;gap:8px;}
.cat-tag{display:inline-block;padding:5px 14px;border-radius:14px;font-size:11px;color:rgba(0,0,0,0.35);background:rgba(0,0,0,0.03);cursor:pointer;font-weight:400;letter-spacing:0.5px;flex-shrink:0;transition:all 0.2s;}
.cat-tag:hover{color:rgba(0,0,0,0.5);background:rgba(0,0,0,0.05);}
.cat-tag.active{color:#fff;background:#1A1A1A;font-weight:500;}
/* Carousel */
.carousel-wrap{position:relative;padding:0 0 8px;}
.carousel{display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 30px;gap:14px;}
.carousel::-webkit-scrollbar{display:none;}
.slide{flex-shrink:0;width:82%;scroll-snap-align:center;border-radius:14px;overflow:hidden;background:#FAFAF8;border:1px solid rgba(0,0,0,0.04);transition:transform 0.3s ease,box-shadow 0.3s ease;}
.slide-media{position:relative;width:100%;height:280px;background:#F0EFED;overflow:hidden;}
.slide-media .ph{width:100%;height:100%;display:block;}
.slide-info{padding:16px 18px 12px;}
.slide-info .name{font-size:15px;font-weight:500;color:#1A1A1A;margin-bottom:5px;letter-spacing:0.3px;}
.slide-info .meta{font-size:12px;color:rgba(0,0,0,0.3);font-weight:300;}
/* Action buttons */
.slide-actions{display:flex;gap:10px;padding:0 18px 18px;}
.action-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;border:1px solid rgba(0,0,0,0.08);background:transparent;cursor:pointer;font-family:inherit;font-size:11px;color:rgba(0,0,0,0.4);letter-spacing:0.3px;transition:all 0.25s ease;-webkit-tap-highlight-color:transparent;}
.action-btn svg{width:14px;height:14px;stroke:rgba(0,0,0,0.35);stroke-width:1.6;fill:none;transition:all 0.25s;}
.action-btn:active{transform:scale(0.95);}
.action-btn.fav-active{border-color:rgba(0,0,0,0.12);background:rgba(0,0,0,0.04);}
.action-btn.fav-active svg{fill:#1A1A1A;stroke:#1A1A1A;}
.action-btn.fav-active{color:#1A1A1A;}
.action-btn.save-btn:active{border-color:rgba(0,0,0,0.15);background:rgba(0,0,0,0.03);}
/* Badges */
.badge-compare{position:absolute;top:12px;left:12px;background:#1A1A1A;color:#fff;font-size:10px;padding:4px 12px;border-radius:12px;letter-spacing:1px;font-weight:500;}
.badge-video{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.badge-video svg{width:20px;height:20px;color:#1A1A1A;margin-left:3px;}
.badge-duration{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;padding:3px 10px;border-radius:10px;font-weight:400;}
/* Indicators */
.carousel-nav{display:flex;justify-content:center;align-items:center;gap:10px;padding:14px 0 4px;}
.dots{display:flex;gap:6px;align-items:center;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.1);transition:all 0.3s ease;}
.dot.active{background:#1A1A1A;width:20px;border-radius:3px;}
.counter{font-size:11px;color:rgba(0,0,0,0.25);font-weight:300;letter-spacing:0.5px;}
.tab-bar{position:absolute;bottom:0;left:0;right:0;height:83px;padding-bottom:28px;display:flex;align-items:center;justify-content:space-around;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,0.04);}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.tab-icon{width:22px;height:22px;background-size:contain;background-repeat:no-repeat;background-position:center;}
.tab-item.active span{color:#1A1A1A;font-size:10px;font-weight:400;letter-spacing:0.5px;}
.tab-item:not(.active) span{color:rgba(0,0,0,0.25);font-size:10px;font-weight:400;letter-spacing:0.5px;}
.tab-item.active .tab-icon{opacity:0.8;}
.tab-item:not(.active) .tab-icon{opacity:0.2;filter:grayscale(1);}
.icon-home{background-image:url("../uploads/image_1782813901351_114p3r6.png");}
.icon-cases{background-image:url("../uploads/image_1782813901352_trz9vsr.png");}
.icon-moments{background-image:url("../uploads/image_1782813901352_i5twl8j.png");}
.icon-class{background-image:url("../uploads/image_1782813901352_mdf49kf.png");}
.icon-me{background-image:url("../uploads/image_1782710209961_sv3yqm4.png");}
.content-area{padding-bottom:100px;}
</style>
</head>
<body>
<div class="phone-frame"><div class="phone-screen">
<div class="status-bar"><span class="status-time">9:41</span><div class="status-icons"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 22h20V2z"/></svg><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="20" r="1" fill="currentColor"/></svg><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="6" width="18" height="12" rx="2"/></svg></div></div>
<div class="content-area">
<div class="page-header">
<div class="wm-wrap">
<span class="wm wm-ali">ALI LAOXI</span>
<span class="wm wm-studio">STUDIO</span>
<span class="wm wm-brow">bROW</span>
</div>
<div class="page-title">案例展示</div>
</div>
<div class="tabs" id="typeTabs">
<div class="tab-pill active" data-type="all" onclick="switchType(this)"><span class="en">all</span><span class="cn">全部</span></div>
<div class="tab-pill" data-type="photo" onclick="switchType(this)"><span class="en">photo</span><span class="cn">图片</span></div>
<div class="tab-pill" data-type="video" onclick="switchType(this)"><span class="en">video</span><span class="cn">视频</span></div>
</div>
<div class="cat-bar"><div class="cat-inner" id="catBar">
<div class="cat-tag active" onclick="switchCat(this)">全部</div>
<div class="cat-tag" onclick="switchCat(this)">眉部</div>
<div class="cat-tag" onclick="switchCat(this)">眼部</div>
<div class="cat-tag" onclick="switchCat(this)">唇部</div>
<div class="cat-tag" onclick="switchCat(this)">祛斑</div>
<div class="cat-tag" onclick="switchCat(this)">纹身</div>
<div class="cat-tag" onclick="switchCat(this)">乳晕</div>
<div class="cat-tag" onclick="switchCat(this)">私密</div>
<div class="cat-tag" onclick="switchCat(this)">其他</div>
</div></div>
<div class="carousel-wrap">
<div class="carousel" id="carousel" onscroll="updateDots()"></div>
<div class="carousel-nav"><div class="dots" id="dots"></div><div class="counter" id="counter"></div></div>
</div>
</div>
<div class="tab-bar">
<div class="tab-item"><div class="tab-icon icon-home"></div><span>首页</span></div>
<div class="tab-item active"><div class="tab-icon icon-cases"></div><span>案例</span></div>
<div class="tab-item"><div class="tab-icon icon-moments"></div><span>朋友圈</span></div>
<div class="tab-item"><div class="tab-icon icon-class"></div><span>教学</span></div>
<div class="tab-item"><div class="tab-icon icon-me"></div><span>我的</span></div>
</div>
</div></div>
<script>
var cases=[
{n:'纹眉失败修复案例',m:'李女士 · 3次治疗 · 06-15',cat:'眉部',v:false,bg:'#EDEBE8'},
{n:'眉形重塑设计',m:'王先生 · 4次治疗 · 06-12',cat:'眉部',v:false,bg:'#E8E6E3'},
{n:'激光洗眉全过程',m:'张医生 · 播放1.2万',cat:'眉部',v:true,d:'02:35',bg:'#F0EFED'},
{n:'洗眉术前术后对比',m:'李医生 · 播放8562',cat:'眉部',v:true,d:'05:12',bg:'#F0EFED'},
{n:'老式纹眉完全淡化',m:'王女士 · 5次治疗 · 06-10',cat:'眉部',v:false,bg:'#EBE9E6'},
{n:'线条眉失败修复',m:'陈女士 · 3次治疗 · 06-05',cat:'眉部',v:false,bg:'#EDEBE8'},
{n:'眼线清洗案例',m:'赵女士 · 2次治疗 · 06-08',cat:'眼部',v:false,bg:'#E6E8EB'},
{n:'美瞳线去除',m:'钱女士 · 1次治疗 · 06-06',cat:'眼部',v:false,bg:'#E8EAED'},
{n:'眼部纹身去除过程',m:'周医生 · 播放5230',cat:'眼部',v:true,d:'03:45',bg:'#E8EBE6'},
{n:'唇部纹绣修复',m:'陈女士 · 2次治疗 · 06-08',cat:'唇部',v:true,d:'03:18',bg:'#EBE6E8'},
{n:'唇色修正前后',m:'黄女士 · 1次治疗 · 06-03',cat:'唇部',v:false,bg:'#EBE6E6'},
{n:'面部祛斑对比',m:'周女士 · 5次治疗 · 06-05',cat:'祛斑',v:false,bg:'#EBE9E6'},
{n:'雀斑淡化疗程',m:'何女士 · 4次治疗 · 06-01',cat:'祛斑',v:false,bg:'#E9EBE6'},
{n:'手臂纹身清洗',m:'刘先生 · 6次治疗 · 06-02',cat:'纹身',v:true,d:'04:22',bg:'#E6EBE9'},
{n:'背部纹身去除',m:'杨先生 · 8次治疗 · 05-28',cat:'纹身',v:false,bg:'#E6E9EB'},
{n:'乳晕漂红修复',m:'王女士 · 2次治疗 · 06-04',cat:'乳晕',v:false,bg:'#E8E0E0'},
{n:'私密色素淡化',m:'张女士 · 3次治疗 · 05-30',cat:'私密',v:false,bg:'#E4E0E8'},
{n:'色素精细化处理',m:'赵女士 · 2次治疗 · 06-08',cat:'其他',v:false,bg:'#F2F0ED'},
{n:'雾眉颜色修正',m:'刘女士 · 2次治疗 · 06-01',cat:'其他',v:false,bg:'#F0EDE8'},
{n:'黄褐斑治疗过程',m:'王医生 · 播放3680',cat:'祛斑',v:true,d:'04:10',bg:'#EBE9E6'}
];
var curType='all',curCat='全部',curList=[];
var playSvg='<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';

function render(){
  curList=cases.filter(function(c){
    if(curType==='photo'&&c.v)return false;
    if(curType==='video'&&!c.v)return false;
    if(curCat!=='全部'&&c.cat!==curCat)return false;
    return true;
  });
  var el=document.getElementById('carousel');
  if(!curList.length){
    el.innerHTML='<div style="flex-shrink:0;width:82%;display:flex;align-items:center;justify-content:center;height:340px;color:rgba(0,0,0,0.2);font-size:14px;">暂无案例</div>';
    document.getElementById('dots').innerHTML='';
    document.getElementById('counter').textContent='';
    return;
  }
  var html='';
  curList.forEach(function(c,i){
    var delay=i*60;
    html+='<div class="slide" style="animation:slideIn 0.4s ease '+delay+'ms both">';
    html+='<div class="slide-media" style="background:'+c.bg+'">';
    if(c.v){
      html+='<div class="badge-video">'+playSvg+'</div>';
      if(c.d) html+='<div class="badge-duration">'+c.d+'</div>';
    }else{
      html+='<div class="badge-compare">对比</div>';
    }
    html+='</div>';
    html+='<div class="slide-info"><div class="name">'+c.n+'</div><div class="meta">'+c.m+'</div></div>';
    html+='<div class="slide-actions">';
    html+='<button class="action-btn fav-btn" onclick="toggleFav(this,event)"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>收藏</button>';
    html+='<button class="action-btn save-btn" onclick="saveAlbum(this,event)"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>保存至相册</button>';
    html+='</div>';
    html+='</div>';
  });
  el.innerHTML=html;
  el.scrollLeft=0;
  buildDots();
}

function buildDots(){
  var total=curList.length;
  var maxDots=Math.min(total,7);
  var dotsEl=document.getElementById('dots');
  var d='';
  for(var i=0;i<maxDots;i++){
    d+='<div class="dot'+(i===0?' active':'')+'"></div>';
  }
  dotsEl.innerHTML=d;
  document.getElementById('counter').textContent='1 / '+total;
}

function updateDots(){
  var el=document.getElementById('carousel');
  if(!curList.length)return;
  var slideW=el.scrollWidth/curList.length;
  var idx=Math.round(el.scrollLeft/slideW);
  idx=Math.min(idx,curList.length-1);
  var maxDots=Math.min(curList.length,7);
  var dots=document.querySelectorAll('#dots .dot');
  dots.forEach(function(d,i){
    if(i<maxDots){
      d.classList.toggle('active',i===Math.min(idx,maxDots-1));
    }
  });
  document.getElementById('counter').textContent=(idx+1)+' / '+curList.length;
}

function switchType(el){
  document.querySelectorAll('#typeTabs .tab-pill').forEach(function(e){e.classList.remove('active')});
  el.classList.add('active');
  curType=el.getAttribute('data-type');
  render();
}

function switchCat(el){
  document.querySelectorAll('#catBar .cat-tag').forEach(function(e){e.classList.remove('active')});
  el.classList.add('active');
  curCat=el.textContent.trim();
  el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  render();
}

function toggleFav(btn,e){
  e.stopPropagation();
  btn.classList.toggle('fav-active');
  var txt=btn.classList.contains('fav-active')?'已收藏':'收藏';
  btn.lastChild.textContent=txt;
}

function saveAlbum(btn,e){
  e.stopPropagation();
  var orig=btn.innerHTML;
  btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>已保存';
  btn.style.color='#1A1A1A';
  btn.style.borderColor='rgba(0,0,0,0.12)';
  setTimeout(function(){btn.innerHTML=orig;btn.style.color='';btn.style.borderColor='';},1800);
}

render();

// Scroll parallax for watermark letters
(function(){
  var screen=document.querySelector('.phone-screen');
  if(!screen)return;
  var ali=document.querySelector('.wm-ali');
  var studio=document.querySelector('.wm-studio');
  var brow=document.querySelector('.wm-brow');
  if(!ali||!studio||!brow)return;
  screen.addEventListener('scroll',function(){
    var y=screen.scrollTop;
    var factor=y*0.15;
    ali.style.marginTop=(factor*0.8)+'px';
    studio.style.marginTop=(factor*1.2)+'px';
    brow.style.marginTop=(factor*0.5)+'px';
  },{passive:true});
})();
</script>
<style>
@keyframes slideIn{
  from{opacity:0;transform:translateX(30px);}
  to{opacity:1;transform:translateX(0);}
}
</style>
</body>
</html>
