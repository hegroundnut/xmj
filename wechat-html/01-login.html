<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 阿利老西</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;padding:40px 0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F0EFED;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;}
.phone-frame{width:375px;height:812px;border-radius:44px;overflow:hidden;background:#fff;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);}
.phone-screen{width:100%;height:100%;overflow:hidden;position:relative;}
.status-bar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:44px;}
.status-time{font-size:15px;font-weight:500;color:#fff;mix-blend-mode:difference;}
.status-icons{display:flex;gap:5px;align-items:center;}
.status-icons svg{width:16px;height:16px;color:#fff;mix-blend-mode:difference;}
.carousel{position:absolute;inset:0;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;}
.slide-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.25);}
.slide-text{position:absolute;left:28px;right:28px;z-index:8;}
.slide-text.top-text{top:90px;}
.slide-text.center-text{top:50%;transform:translateY(-50%);}
.slide-number{font-size:72px;font-weight:200;color:rgba(255,255,255,0.7);line-height:1;margin-bottom:4px;font-family:"Helvetica Neue",sans-serif;}
.slide-label{font-size:11px;letter-spacing:6px;color:rgba(255,255,255,0.45);text-transform:uppercase;font-weight:400;}
.slide-big-text{font-size:44px;font-weight:700;color:#fff;line-height:1.15;letter-spacing:4px;text-shadow:0 2px 20px rgba(0,0,0,0.2);}
.slide-big-text .en-mix{font-size:14px;font-weight:400;letter-spacing:3px;color:rgba(255,255,255,0.6);display:block;margin-top:8px;text-transform:uppercase;}
.carousel-dots{position:absolute;top:75px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:15;}
.carousel-dots .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);transition:all 0.3s;}
.carousel-dots .dot.active{background:rgba(255,255,255,0.9);width:18px;border-radius:3px;}
.bottom-section{position:absolute;bottom:0;left:0;right:0;z-index:15;padding:0 28px 50px;}
.brand-strip{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.brand-logo-cn{font-size:18px;font-weight:700;color:#fff;letter-spacing:4px;text-shadow:0 1px 8px rgba(0,0,0,0.2);}
.brand-logo-en{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.5);font-weight:400;text-transform:uppercase;}
.login-btn{width:100%;padding:15px;background:#1A1A1A;color:#fff;border:none;border-radius:30px;font-size:14px;font-weight:400;cursor:pointer;font-family:inherit;letter-spacing:3px;margin-bottom:10px;position:relative;overflow:hidden;transition:transform 0.2s;}
.login-btn:active{transform:scale(0.98);}
.login-btn::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.06) 50%,transparent 60%);}
.login-btn-phone{width:100%;padding:15px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:30px;font-size:14px;font-weight:400;cursor:pointer;font-family:inherit;letter-spacing:3px;margin-bottom:14px;position:relative;overflow:hidden;transition:transform 0.2s;backdrop-filter:blur(10px);}
.login-btn-phone:active{transform:scale(0.98);}
.agreement{display:flex;align-items:flex-start;gap:8px;justify-content:center;}
.checkbox{width:14px;height:14px;border:1.5px solid rgba(255,255,255,0.35);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;}
.checkbox svg{width:9px;height:9px;color:rgba(255,255,255,0.7);stroke-width:2.5;}
.agreement-text{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.5;font-weight:300;}
.agreement-text a{color:rgba(255,255,255,0.7);text-decoration:none;}
.bottom-gradient{position:absolute;bottom:0;left:0;right:0;height:320px;background:linear-gradient(transparent,rgba(0,0,0,0.5));z-index:6;pointer-events:none;}
.top-gradient{position:absolute;top:0;left:0;right:0;height:120px;background:linear-gradient(rgba(0,0,0,0.25),transparent);z-index:6;pointer-events:none;}
</style>
</head>
<body>
<div class="phone-frame"><div class="phone-screen">
<div class="status-bar"><span class="status-time">9:41</span><div class="status-icons"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 22h20V2z"/></svg><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="6" width="18" height="12" rx="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg></div></div>
<div class="carousel">
<div class="slide active">
<img src="../uploads/image_1782652705496_js6ea3z.png">
<div class="slide-overlay"></div>
<div class="slide-text top-text"><div class="slide-number">01</div><div class="slide-label">PROFESSIONAL</div></div>
<div class="slide-text center-text"><div class="slide-big-text">专业洗眉<span class="en-mix">BROW WASHING</span></div></div>
</div>
<div class="slide">
<img src="../uploads/image_1782652705494_0gyz9ka.png">
<div class="slide-overlay"></div>
<div class="slide-text top-text"><div class="slide-number">02</div><div class="slide-label">MASTER CLASS</div></div>
<div class="slide-text center-text"><div class="slide-big-text">匠心教学<span class="en-mix">MASTER CLASS</span></div></div>
</div>
<div class="slide">
<img src="../uploads/image_1782652705496_u2b96ec.png">
<div class="slide-overlay"></div>
<div class="slide-text top-text"><div class="slide-number">03</div><div class="slide-label">STUDIO</div></div>
<div class="slide-text center-text"><div class="slide-big-text">阿利老西<span class="en-mix">ALI LAOXI STUDIO</span></div></div>
</div>
</div>
<div class="top-gradient"></div>
<div class="bottom-gradient"></div>
<div class="carousel-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
<div class="bottom-section">
<div class="brand-strip"><div><div class="brand-logo-cn">阿利老西</div><div class="brand-logo-en">ALI LAOXI</div></div></div>
<button class="login-btn" onclick="window.location.href='01b-bind-phone.html'">微信一键登录</button>

<div class="checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
<div class="agreement-text">登录即同意 <a>《用户协议》</a> 和 <a>《隐私政策》</a></div>
</div>
</div>
</div></div>
<script>
(function(){
var slides=document.querySelectorAll('.slide');
var dots=document.querySelectorAll('.carousel-dots .dot');
var current=0;
setInterval(function(){
slides[current].classList.remove('active');
dots[current].classList.remove('active');
current=(current+1)%slides.length;
slides[current].classList.add('active');
dots[current].classList.add('active');
},3500);
})();
</script>
</body>
</html>
